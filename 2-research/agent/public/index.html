<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agency AI Employee</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a30;
      --panel-2: #18213d;
      --text: #eef3ff;
      --muted: #a5b3d9;
      --accent: #5ea0ff;
      --good: #20c997;
      --warn: #f0ad4e;
      --bad: #ff6b6b;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #08101e, #11192f 40%, #0d1426);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .hero, .card {
      background: rgba(18, 26, 48, .92);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.28);
    }
    .hero { padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { color: var(--muted); }
    form {
      display: grid;
      grid-template-columns: 1.5fr .7fr auto;
      gap: 12px;
      margin-top: 18px;
    }
    input, button {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      font-size: 16px;
    }
    input {
      background: var(--panel-2);
      color: var(--text);
    }
    button {
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .65; cursor: wait; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .card { padding: 18px; }
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .score {
      font-size: 26px;
      font-weight: 800;
    }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .strong { background: rgba(32, 201, 151, .16); color: #7ef0ca; }
    .good { background: rgba(94, 160, 255, .16); color: #9fc4ff; }
    .fair { background: rgba(240, 173, 78, .16); color: #ffd28f; }
    .poor { background: rgba(255, 107, 107, .16); color: #ffabab; }
    .summary, .notes, .raw {
      margin-top: 18px;
      padding: 18px;
    }
    ul { margin: 8px 0 0 18px; color: var(--muted); }
    .muted { color: var(--muted); }
    .hidden { display: none; }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-x: auto;
      color: #dbe5ff;
    }
    @media (max-width: 760px) {
      form { grid-template-columns: 1fr; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Agency AI Employee</h1>
      <p>Evaluate a company’s online presence across SEO, AEO, maps, Yelp, social, and website quality.</p>
      <form id="evalForm">
        <input id="companyName" name="companyName" placeholder="Company name" required />
        <input id="zipCode" name="zipCode" placeholder="Zip code" required />
        <button id="submitBtn" type="submit">Evaluate</button>
      </form>
      <p id="status" class="muted"></p>
    </section>

    <section id="results" class="hidden">
      <div class="summary hero" id="summaryBox"></div>
      <div class="grid" id="scoreGrid"></div>
      <div class="notes card" id="notesBox"></div>
      <div class="raw card">
        <details>
          <summary>Raw signals</summary>
          <pre id="rawJson"></pre>
        </details>
      </div>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
